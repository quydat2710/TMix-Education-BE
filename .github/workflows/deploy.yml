name: 🚀 Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch: # Cho phép chạy thủ công từ GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout code
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js với cache
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Install dependencies (trên GitHub runner - 7GB RAM)
      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      # 4. Build TypeScript (trên GitHub runner - KHÔNG build trên EC2)
      - name: 🔨 Build NestJS
        run: npm run build

      # 5. Copy dist + package files lên server
      - name: 📤 Deploy to EC2
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.EC2_HOST }}
          REMOTE_USER: ${{ secrets.EC2_USER }}
          SOURCE: "dist package.json package-lock.json"
          TARGET: /home/ubuntu/TMix-Education-BE/
          SCRIPT_BEFORE: |
            echo "🔄 Starting deployment..."
            echo "Cleaning old dist..."
            rm -rf /home/ubuntu/TMix-Education-BE/dist
          SCRIPT_AFTER: |
            echo "=== DEPLOY START ==="
            cd /home/ubuntu/TMix-Education-BE
            npm install --production --legacy-peer-deps
            
            echo "=== Current PM2 status ==="
            pm2 list || true
            pm2 describe tmix-backend || true
            
            echo "=== Stopping and deleting ALL PM2 processes ==="
            pm2 stop all || true
            pm2 delete all || true
            
            echo "=== Verifying port 3000 is free ==="
            sudo fuser -k 3000/tcp || true
            sleep 2
            
            echo "=== Starting backend from /home/ubuntu/TMix-Education-BE ==="
            pm2 start /home/ubuntu/TMix-Education-BE/dist/main.js --name tmix-backend
            
            echo "=== Starting TTS server ==="
            pm2 start /home/ubuntu/TMix-TTS-Server/server.py --name tmix-tts --interpreter python3 || true
            
            echo "=== Saving PM2 state ==="
            pm2 save --force
            
            echo "=== Final PM2 status ==="
            pm2 list
            
            echo "=== Verifying port 3000 ==="
            sleep 3
            curl -s http://localhost:3000/api || echo "Backend not responding yet"
            
            echo "=== DEPLOY COMPLETE ==="
