name: 🚀 Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch: # Cho phép chạy thủ công từ GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout code
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js với cache
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Install dependencies (trên GitHub runner - 7GB RAM)
      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      # 4. Build TypeScript (trên GitHub runner - KHÔNG build trên EC2)
      - name: 🔨 Build NestJS
        run: npm run build

      # 5. Copy dist + package files lên server
      - name: 📤 Deploy to EC2
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.EC2_HOST }}
          REMOTE_USER: ${{ secrets.EC2_USER }}
          SOURCE: "dist package.json package-lock.json"
          TARGET: /home/ubuntu/TMix-Education-BE/
          SCRIPT_BEFORE: |
            rm -rf /home/ubuntu/TMix-Education-BE/dist
          SCRIPT_AFTER: |
            cd /home/ubuntu/TMix-Education-BE
            npm install --production --legacy-peer-deps
            pm2 stop all || true
            pm2 delete all || true
            pm2 start /home/ubuntu/TMix-Education-BE/dist/main.js --name tmix-backend
            pm2 start /home/ubuntu/TMix-TTS-Server/server.py --name tmix-tts --interpreter python3 || true
            pm2 save --force
            echo "✅ Backend deployed successfully!"
