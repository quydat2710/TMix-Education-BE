name: 🚀 Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch: # Cho phép chạy thủ công từ GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout code
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js với cache
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Install dependencies (trên GitHub runner - 7GB RAM)
      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      # 4. Build TypeScript (trên GitHub runner - KHÔNG build trên EC2)
      - name: 🔨 Build NestJS
        run: npm run build

      # 5. Copy dist + package files lên server
      - name: 📤 Deploy to EC2
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.EC2_HOST }}
          REMOTE_USER: ${{ secrets.EC2_USER }}
          SOURCE: "dist/ package.json package-lock.json"
          TARGET: /home/ubuntu/TMix-Education-BE/
          SCRIPT_BEFORE: |
            echo "🔄 Starting deployment..."
          SCRIPT_AFTER: |
            cd /home/ubuntu/TMix-Education-BE
            npm install --production --legacy-peer-deps
            echo "--- Killing ALL pm2 processes ---"
            pm2 kill || true
            sleep 2
            echo "--- Killing anything on port 3000 ---"
            sudo fuser -k 3000/tcp || true
            sleep 1
            echo "--- Starting fresh from TMix-Education-BE ---"
            cd /home/ubuntu/TMix-Education-BE
            NODE_ENV=production pm2 start dist/main.js --name tmix-backend
            echo "--- Restarting TTS server ---"
            cd /home/ubuntu/TMix-TTS-Server
            pm2 start server.py --name tmix-tts --interpreter python3 || true
            pm2 save
            pm2 list
            echo "✅ All services deployed successfully!"
